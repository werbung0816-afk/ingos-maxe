<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ingo's Mäxchen</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#d4af37;--gold2:#edd060;--gold3:#9a7015;
  --bg:#020a04;--bg2:#060f07;--bg3:#0b1a0d;
  --text:#e8e0d0;--text2:rgba(232,224,208,.55);
}
body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--text);
  min-height:100vh;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#0a1f0c 0%,var(--bg) 70%);}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;
  padding:10px 20px 8px;background:rgba(2,10,4,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,175,55,.08);z-index:100;}
.logo-row{display:flex;align-items:center;gap:12px;}
.logo-photo-wrap{position:relative;flex-shrink:0;}
.logo-photo{display:block;}
.logo-star{display:none;}
.logo-text{display:flex;flex-direction:column;justify-content:center;line-height:1.2;gap:4px;}
.logo-ingos{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:rgba(212,175,55,.5);}
.logo-main{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:6px;color:var(--gold);line-height:1;}

/* ── MAIN GAME AREA ── */
.game-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100vh;padding:90px 20px 20px;gap:0;width:100%;max-width:500px;}

/* ── STATUS ── */
#status-msg{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;
  color:var(--text2);text-align:center;min-height:22px;margin-bottom:24px;transition:color .3s;}
#status-msg.highlight{color:var(--gold);}

/* ── CUP CONTAINER ── */
.cup-scene{position:relative;width:260px;height:370px;margin:0 auto;}

/* Die area — behind the cup */
.dice-area{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  display:flex;gap:20px;align-items:flex-end;justify-content:center;
  padding-bottom:14px;
  transition:opacity .3s;
}

/* Cup wrapper — slides up/down */
#cup-wrap{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:220px;
  cursor:grab;
  transition:bottom .4s cubic-bezier(.25,.8,.25,1);
  touch-action:none;
  user-select:none;
}
#cup-wrap svg{width:100%;height:auto;display:block;}
#cup-wrap.lifted{bottom:160px;}
#cup-wrap.shaking{animation:cupShake .4s ease-in-out;}
@keyframes cupShake{
  0%{transform:translateX(-50%) rotate(0deg);}
  15%{transform:translateX(calc(-50% - 8px)) rotate(-6deg);}
  30%{transform:translateX(calc(-50% + 8px)) rotate(5deg);}
  45%{transform:translateX(calc(-50% - 6px)) rotate(-4deg);}
  60%{transform:translateX(calc(-50% + 6px)) rotate(3deg);}
  75%{transform:translateX(calc(-50% - 3px)) rotate(-2deg);}
  100%{transform:translateX(-50%) rotate(0deg);}
}

/* Die styles */
.die{width:70px;height:70px;border-radius:11px;background:#f5f0e8;
  border:2px solid #d4d0c8;display:inline-flex;align-items:center;justify-content:center;
  position:relative;box-shadow:0 4px 14px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9);
  transition:transform .15s;}
.die.rolling{animation:dieRoll .08s infinite alternate;}
@keyframes dieRoll{from{transform:rotate(-3deg) scale(.97);}to{transform:rotate(3deg) scale(1.03);}}
.pip{position:absolute;border-radius:50%;background:#1a1a1a;
  transform:translate(-50%,-50%);}

/* ── LIFT HINT ── */
.lift-hint{font-size:11px;color:rgba(212,175,55,.35);letter-spacing:2px;
  font-family:'Cinzel',serif;text-align:center;margin-top:16px;
  animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:.7;};}

/* ── BUTTONS ── */
.btn-area{display:flex;flex-direction:column;align-items:center;gap:10px;
  margin-top:32px;width:100%;max-width:280px;}
.btn-roll{
  width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));
  color:#1a0f00;font-weight:700;font-size:14px;font-family:'Cinzel',serif;
  letter-spacing:3px;transition:filter .2s,transform .1s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-roll:hover{filter:brightness(1.1);}
.btn-roll:active{transform:scale(.97);}
.btn-roll:disabled{filter:grayscale(.6);cursor:not-allowed;opacity:.6;}

/* ── RESULT BADGE ── */
#result-badge{
  font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--gold);
  letter-spacing:4px;text-align:center;min-height:40px;margin-bottom:6px;
  text-shadow:0 0 20px rgba(212,175,55,.4);
  transition:all .3s;
}
#result-sub{font-size:11px;color:var(--text2);letter-spacing:3px;
  font-family:'Cinzel',serif;text-align:center;min-height:16px;}

@media(max-width:430px){
  .die{width:64px;height:64px;border-radius:10px;}
  .cup-scene{width:240px;height:350px;}
  #cup-wrap{width:200px;}
  #cup-wrap.lifted{bottom:150px;}
}
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div style="position:relative;flex-shrink:0;">
      <img id="ingo-hdr" src="" alt="Ingo" style="width:46px;height:46px;border-radius:50%;object-fit:cover;object-position:center 25%;border:2px solid var(--gold);box-shadow:0 0 12px rgba(212,175,55,.3);">
      <div style="position:absolute;bottom:-3px;right:-3px;background:linear-gradient(135deg,var(--gold3),var(--gold));border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;">★</div>
    </div>
    <div class="logo-text">
      <div class="logo-ingos">I N G O ' S</div>
      <div class="logo-main">MÄXCHEN</div>
    </div>
  </div>
</header>

<div class="game-wrap">
  <div class="cup-scene">
    <!-- Dice (hidden under cup) -->
    <div class="dice-area" id="dice-area">
      <div class="die" id="die1"></div>
      <div class="die" id="die2"></div>
    </div>

    <!-- Cup (slides up to reveal) -->
    <div id="cup-wrap" id="cup-wrap">
      <svg width="190" height="240" viewBox="0 0 140 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Rim -->
        <rect x="8" y="0" width="124" height="24" rx="7" fill="#5c3a1e"/>
        <rect x="10" y="2" width="120" height="20" rx="6" fill="#7a4e2b"/>
        <!-- Body -->
        <path d="M18 24 L6 196 L134 196 L122 24 Z" fill="#5c3a1e"/>
        <path d="M18 24 L6 196 L134 196 L122 24 Z" fill="url(#cg2)"/>
        <!-- Stitch lines -->
        <path d="M28 36 L18 178" stroke="rgba(180,120,60,.35)" stroke-width="1.5" stroke-dasharray="4,7"/>
        <path d="M112 36 L122 178" stroke="rgba(180,120,60,.35)" stroke-width="1.5" stroke-dasharray="4,7"/>
        <!-- Horizontal shadow lines -->
        <path d="M22 60 L118 60" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
        <path d="M17 100 L123 100" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
        <path d="M13 145 L127 145" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
        <!-- Bottom ellipse shadow -->
        <ellipse cx="70" cy="194" rx="64" ry="6" fill="rgba(0,0,0,.35)"/>
        <!-- Rim highlight -->
        <ellipse cx="70" cy="24" rx="62" ry="8" fill="rgba(0,0,0,.2)"/>
        <defs>
          <linearGradient id="cg2" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(0,0,0,.4)"/>
            <stop offset="20%" stop-color="rgba(255,200,100,.08)"/>
            <stop offset="55%" stop-color="rgba(255,200,100,.04)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,.35)"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>



  <div class="btn-area">
    <button class="btn-roll" id="btn-roll" onclick="doRoll()">🎲 WÜRFELN</button>
  </div>
</div>

  document.querySelectorAll('#ingo-hdr').forEach(img=>img.src=INGO_B64);
});

// ── STATE ──
let d1=0,d2=0,hasRolled=false,isLifted=false,isDragging=false;
let dragStartY=0,cupStartBottom=0;

// ── AUDIO ──
let AC=null,diceAudioBuf=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function b64ToArrBuf(b64){const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes.buffer;}
async function loadDiceAudio(){
  try{const ac=getAC();if(!ac||diceAudioBuf)return;
    const raw=DICE_SRC.split(',')[1];
    const arr=b64ToArrBuf(raw);
    diceAudioBuf=await ac.decodeAudioData(arr);
  }catch(e){}
}
function playRoll(){
  try{const ac=getAC();if(!ac||!diceAudioBuf)return;
    const src=ac.createBufferSource();src.buffer=diceAudioBuf;
    const g=ac.createGain();g.gain.value=0.9;
    src.connect(g);g.connect(ac.destination);src.start();
  }catch(e){}
}
function playWhoosh(up=true){
  try{
    const ac=getAC();if(!ac)return;
    const dur=0.55,sr=ac.sampleRate;
    const buf=ac.createBuffer(1,Math.floor(sr*dur),sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
    const src=ac.createBufferSource();src.buffer=buf;
    const filt=ac.createBiquadFilter();
    filt.type='bandpass';filt.Q.value=0.7;
    const fStart=up?1400:200, fEnd=up?180:1100;
    filt.frequency.setValueAtTime(fStart,ac.currentTime);
    filt.frequency.exponentialRampToValueAtTime(fEnd,ac.currentTime+dur);
    const g=ac.createGain();
    g.gain.setValueAtTime(3.0,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+dur);
    src.connect(filt);filt.connect(g);g.connect(ac.destination);
    src.start();
  }catch(e){}
}

// ── MÄXCHEN RULES ──
function evalDice(a,b){
  const hi=Math.max(a,b),lo=Math.min(a,b);
  // Mäxchen = 2+1
  if(hi===2&&lo===1)return{name:'Mäxchen!',rank:1000,display:'M Ä X C H E N'};
  // Pasch
  if(hi===lo)return{name:`Pasch ${hi}`,rank:100+hi,display:`${hi} — ${hi}`};
  // Normal: higher die first, e.g. 6+3 = "63"
  const val=hi*10+lo;
  return{name:`${hi}—${lo}`,rank:val,display:`${hi} — ${lo}`};
}

// ── DIE RENDER ──
function renderDie(el,val,pip=10){
  el.innerHTML='';
  (PIPS[val]||[]).forEach(([px,py])=>{
    const p=document.createElement('div');
    p.className='pip';
    p.style.cssText=`left:${px}%;top:${py}%;transform:translate(-50%,-50%);width:${pip}px;height:${pip}px`;
    el.appendChild(p);
  });
}

// ── ROLL ──
async function doRoll(){
  await loadDiceAudio();
  const btn=document.getElementById('btn-roll');
  const cupWrap=document.getElementById('cup-wrap');
  const d1el=document.getElementById('die1');
  const d2el=document.getElementById('die2');

  // Lower cup first if lifted
  if(isLifted){lowerCup();await new Promise(r=>setTimeout(r,450));}

  // Disable button
  btn.disabled=true;
  setStatus('',false);

  // Shake animation + sound
  cupWrap.classList.add('shaking');
  playRoll();

  // Animate dice rolling (hidden under cup)
  d1el.classList.add('rolling');d2el.classList.add('rolling');
  let t=0;const ival=setInterval(()=>{
    d1=Math.ceil(Math.random()*6);
    d2=Math.ceil(Math.random()*6);
    renderDie(d1el,d1,10);renderDie(d2el,d2,10);
    t+=80;if(t>=400)clearInterval(ival);
  },80);

  await new Promise(r=>setTimeout(r,500));
  cupWrap.classList.remove('shaking');
  d1el.classList.remove('rolling');d2el.classList.remove('rolling');

  // Final roll
  d1=Math.ceil(Math.random()*6);
  d2=Math.ceil(Math.random()*6);
  renderDie(d1el,d1,10);renderDie(d2el,d2,10);
  hasRolled=true;

  setStatus('',false);
  hasRolled=true;

  btn.disabled=false;
  btn.textContent='🎲 NEU WÜRFELN';
}

function showResult(){
  setStatus('',true);
}

function hideResult(){
  setStatus('',false);
}

function setStatus(msg,gold){}

// ── CUP LIFT / LOWER ──
function liftCup(){
  if(!hasRolled||isLifted)return;
  isLifted=true;
  document.getElementById('cup-wrap').classList.add('lifted');
  showResult();
}
function lowerCup(){
  if(!isLifted)return;
  isLifted=false;
  document.getElementById('cup-wrap').classList.remove('lifted');
  hideResult();
}

// ── TOUCH / MOUSE DRAG ON CUP ──
const cup=document.getElementById('cup-wrap');

function getY(e){return e.touches?e.touches[0].clientY:e.clientY;}

cup.addEventListener('mousedown',startDrag);
cup.addEventListener('touchstart',startDrag,{passive:true});

function startDrag(e){
  if(!hasRolled)return;
  isDragging=true;
  dragStartY=getY(e);
  cup.style.transition='none';
  playWhoosh(!isLifted);
}
window.addEventListener('mousemove',onDrag);
window.addEventListener('touchmove',onDrag,{passive:false});
function onDrag(e){
  if(!isDragging)return;
  if(e.cancelable)e.preventDefault();
  const dy=dragStartY-getY(e); // positive = dragged up
  const scene=document.querySelector('.cup-scene');
  const maxLift=160;
  const currentBase=isLifted?maxLift:0;
  const newBottom=Math.max(0,Math.min(maxLift,currentBase+dy));
  cup.style.bottom=newBottom+'px';
  if(newBottom>80&&!isLifted){showResult();}
  else if(newBottom<80&&isLifted){hideResult();}
}
window.addEventListener('mouseup',endDrag);
window.addEventListener('touchend',endDrag);
function endDrag(e){
  if(!isDragging)return;
  isDragging=false;
  cup.style.transition='bottom .4s cubic-bezier(.25,.8,.25,1)';
  const cur=parseInt(cup.style.bottom)||0;
  if(cur>80){liftCup();}else{lowerCup();}
}

// Also allow tap/click to toggle
cup.addEventListener('click',(e)=>{
  if(!hasRolled)return;
  playWhoosh(!isLifted);
  if(isLifted)lowerCup();else liftCup();
});
</script>
